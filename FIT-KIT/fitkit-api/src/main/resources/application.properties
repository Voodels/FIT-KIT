#app config 
spring.application.name=FitKitBackend
server.port=8082

# NEON DB
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Tell Hibernate to automatically create or update tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Print the SQL queries to the console so you can see exactly what Hibernate is doing
spring.jpa.show-sql=true

# Storage Config
# Set to 'local' for local file system or 's3' for AWS S3
app.storage.type=local
app.storage.local-dir=uploads

# AWS Config (Required if app.storage.type=s3)
aws.access-key=${AWS_ACCESS_KEY_ID:${AWS_ACCESS_KEY:}}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:${AWS_SECRET_KEY:}}
aws.s3.bucket-name=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.presign-ttl-minutes=10
aws.s3.max-upload-bytes=5242880
aws.s3.allowed-content-types=image/jpeg,image/png,image/webp

# JWT Config
jwt.secret=${JWT_SECRET:mySuperSecretKeyForDevelopmentOnly1234567890123456789012345678901234567890}
jwt.issuer=fitkit-api
jwt.access-token-ttl-minutes=15
jwt.refresh-token-ttl-days=7
jwt.cookie.access-name=fitkit_access
jwt.cookie.refresh-name=fitkit_refresh
jwt.cookie.secure=false
jwt.cookie.same-site=Strict
jwt.cookie.domain=
jwt.cookie.path=/